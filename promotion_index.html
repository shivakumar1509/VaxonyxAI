<style>
  /*
   * BulkMind AI homepage promotion
   * Balanced medium-size version
   */

  .vx-bm-promo-wrap{
    width:min(760px,92%);
    margin:30px auto 0;
    padding:0;
  }

  .vx-bm-promo{
    position:relative;
    isolation:isolate;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;

    width:100%;
    box-sizing:border-box;
    padding:18px 20px;

    color:#fff;
    text-align:left;
    text-decoration:none;

    border:1px solid rgba(255,255,255,.40);
    border-radius:19px;

    background:
      radial-gradient(
        circle at 91% 18%,
        rgba(111,211,255,.23),
        transparent 34%
      ),
      linear-gradient(
        135deg,
        rgba(255,255,255,.19),
        rgba(255,255,255,.075)
      );

    box-shadow:
      0 19px 42px rgba(0,15,42,.30),
      inset 0 1px 0 rgba(255,255,255,.28),
      inset 0 -1px 0 rgba(255,255,255,.06);

    -webkit-backdrop-filter:blur(15px);
    backdrop-filter:blur(15px);

    transform:translateZ(0);

    transition:
      transform .25s ease,
      border-color .25s ease,
      box-shadow .25s ease;
  }

  /*
   * Fine illuminated border along the top
   */
  .vx-bm-promo::after{
    content:"";
    position:absolute;
    z-index:0;

    top:0;
    left:10%;

    width:80%;
    height:1px;

    pointer-events:none;

    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.90),
      transparent
    );

    opacity:.70;
  }

  /*
   * Slow professional shimmer
   */
  .vx-bm-promo::before{
    content:"";
    position:absolute;
    z-index:0;

    top:-120%;
    left:-34%;

    width:21%;
    height:350%;

    pointer-events:none;

    transform:rotate(18deg);

    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.18),
      transparent
    );

    animation:vx-bm-shimmer 7.2s ease-in-out infinite;
  }

  .vx-bm-promo:hover{
    color:#fff;
    text-decoration:none;

    transform:translateY(-4px);

    border-color:rgba(255,255,255,.65);

    box-shadow:
      0 27px 56px rgba(0,15,42,.38),
      inset 0 1px 0 rgba(255,255,255,.32),
      inset 0 -1px 0 rgba(255,255,255,.07);
  }

  .vx-bm-promo:focus-visible{
    outline:3px solid rgba(255,255,255,.96);
    outline-offset:5px;
  }

  .vx-bm-promo-copy{
    position:relative;
    z-index:2;

    min-width:0;
    flex:1 1 auto;
  }

  .vx-bm-promo-meta{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;

    margin:0 0 6px;
  }

  .vx-bm-promo-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;

    padding:5px 9px;

    border:1px solid rgba(255,255,255,.42);
    border-radius:999px;

    background:rgba(0,28,57,.42);

    color:#fff;

    font:
      800 9px/1
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:.10em;
    text-transform:uppercase;

    box-shadow:0 6px 16px rgba(0,0,0,.13);
  }

  .vx-bm-promo-dot{
    width:6px;
    height:6px;
    flex:0 0 auto;

    border-radius:50%;

    background:#70f0ae;

    box-shadow:
      0 0 0 4px rgba(112,240,174,.11),
      0 0 13px rgba(112,240,174,.65);

    animation:vx-bm-pulse 2.8s ease-in-out infinite;
  }

  .vx-bm-promo-platform{
    color:rgba(255,255,255,.76);

    font:
      800 9px/1.2
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:.11em;
    text-transform:uppercase;
  }

  .vx-bm-promo-title{
    margin:0;

    color:#fff;

    font:
      850 24px/1.12
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:-.025em;
  }

  .vx-bm-promo-title span{
    color:#b7e6ff;

    text-shadow:
      0 0 19px rgba(183,230,255,.24);
  }

  .vx-bm-promo-description{
    max-width:540px;

    margin:6px 0 0;

    color:rgba(255,255,255,.89);

    font:
      500 12.5px/1.45
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;
  }

  .vx-bm-promo-action{
    position:relative;
    z-index:2;

    display:flex;
    align-items:center;
    justify-content:center;

    flex:0 0 auto;
  }

  .vx-bm-promo-button{
    position:relative;
    overflow:hidden;

    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;

    min-width:165px;
    padding:13px 16px;

    box-sizing:border-box;

    border:1px solid rgba(255,255,255,.36);
    border-radius:13px;

    background:linear-gradient(
      135deg,
      #ff7b49,
      #ef552e
    );

    color:#fff;

    font:
      800 12px/1.15
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    white-space:nowrap;

    box-shadow:
      0 12px 25px rgba(185,50,21,.34),
      inset 0 1px 0 rgba(255,255,255,.28);

    transition:
      transform .25s ease,
      box-shadow .25s ease,
      filter .25s ease;
  }

  .vx-bm-promo-button::before{
    content:"";

    position:absolute;
    inset:0;

    pointer-events:none;

    background:linear-gradient(
      110deg,
      transparent 22%,
      rgba(255,255,255,.27) 48%,
      transparent 73%
    );

    transform:translateX(-125%);

    transition:transform .7s ease;
  }

  .vx-bm-promo:hover .vx-bm-promo-button{
    transform:translateY(-2px);
    filter:saturate(1.08);

    box-shadow:
      0 17px 32px rgba(185,50,21,.43),
      inset 0 1px 0 rgba(255,255,255,.32);
  }

  .vx-bm-promo:hover .vx-bm-promo-button::before{
    transform:translateX(125%);
  }

  .vx-bm-promo-arrow{
    display:inline-block;

    font-size:15px;
    line-height:1;

    transition:transform .25s ease;
  }

  .vx-bm-promo:hover .vx-bm-promo-arrow{
    transform:translateX(4px);
  }

  @keyframes vx-bm-shimmer{
    0%,
    58%{
      left:-34%;
      opacity:0;
    }

    66%{
      opacity:1;
    }

    84%,
    100%{
      left:125%;
      opacity:0;
    }
  }

  @keyframes vx-bm-pulse{
    0%,
    100%{
      transform:scale(1);

      box-shadow:
        0 0 0 4px rgba(112,240,174,.11),
        0 0 12px rgba(112,240,174,.55);
    }

    50%{
      transform:scale(1.16);

      box-shadow:
        0 0 0 7px rgba(112,240,174,.04),
        0 0 18px rgba(112,240,174,.76);
    }
  }

  @media (max-width:800px){
    .vx-bm-promo-wrap{
      width:min(650px,92%);
      margin-top:28px;
    }

    .vx-bm-promo{
      gap:18px;
      padding:17px 18px;
    }

    .vx-bm-promo-title{
      font-size:22px;
    }

    .vx-bm-promo-description{
      font-size:12px;
    }

    .vx-bm-promo-button{
      min-width:150px;
      padding:12px 14px;
      font-size:11px;
    }
  }

  @media (max-width:620px){
    .vx-bm-promo-wrap{
      width:92%;
      margin-top:25px;
    }

    .vx-bm-promo{
      flex-direction:column;
      align-items:stretch;
      gap:15px;

      padding:17px;

      text-align:center;
    }

    .vx-bm-promo-copy{
      text-align:center;
    }

    .vx-bm-promo-meta{
      justify-content:center;
    }

    .vx-bm-promo-description{
      margin-inline:auto;
    }

    .vx-bm-promo-action{
      width:100%;
    }

    .vx-bm-promo-button{
      min-width:175px;
    }
  }

  @media (max-width:420px){
    .vx-bm-promo-wrap{
      width:94%;
      margin-top:22px;
    }

    .vx-bm-promo{
      padding:15px 13px;
      border-radius:17px;
    }

    .vx-bm-promo-title{
      font-size:20px;
    }

    .vx-bm-promo-description{
      font-size:11.5px;
    }

    .vx-bm-promo-button{
      padding:11px 14px;
      font-size:11px;
    }
  }

  @media (prefers-reduced-motion:reduce){
    .vx-bm-promo::before,
    .vx-bm-promo-dot{
      animation:none;
    }

    .vx-bm-promo,
    .vx-bm-promo-button,
    .vx-bm-promo-button::before,
    .vx-bm-promo-arrow{
      transition:none;
    }
  }
</style>

<div class="vx-bm-promo-wrap">
  <a
    class="vx-bm-promo"
    href="https://ai.vaxonyx.com/bulkmind/#/"
    aria-label="Explore the newly launched BulkMind AI platform"
  >
    <div class="vx-bm-promo-copy">
      <div class="vx-bm-promo-meta">
        <span class="vx-bm-promo-badge">
          <span class="vx-bm-promo-dot" aria-hidden="true"></span>
          New Launch
        </span>

        <span class="vx-bm-promo-platform">
          Vaxonyx AI Platform
        </span>
      </div>

      <h2 class="vx-bm-promo-title">
        Introducing <span>BulkMind AI</span>
      </h2>

      <p class="vx-bm-promo-description">
        AI-powered bulk RNA-seq analysis, pathway prioritization,
        transcription-factor activity, and biological interpretation.
      </p>
    </div>

    <div class="vx-bm-promo-action" aria-hidden="true">
      <span class="vx-bm-promo-button">
        Explore BulkMind AI
        <span class="vx-bm-promo-arrow">→</span>
      </span>
    </div>
  </a>
</div>
