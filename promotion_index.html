<style>
  /*
   * Compact BulkMind AI launch ribbon
   * Replace the entire promotion_index.html with this file.
   */

  .vx-mini-promo-wrap{
    width:min(590px,88%);
    margin:24px auto 0;
  }

  .vx-mini-promo{
    position:relative;
    isolation:isolate;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;

    width:100%;
    padding:12px 14px 12px 16px;

    border:1px solid rgba(255,255,255,.36);
    border-radius:16px;

    background:
      radial-gradient(
        circle at 90% 20%,
        rgba(106,211,255,.20),
        transparent 34%
      ),
      linear-gradient(
        135deg,
        rgba(255,255,255,.17),
        rgba(255,255,255,.07)
      );

    box-shadow:
      0 14px 32px rgba(0,15,42,.26),
      inset 0 1px 0 rgba(255,255,255,.24);

    -webkit-backdrop-filter:blur(14px);
    backdrop-filter:blur(14px);

    color:#fff;
    text-decoration:none;

    transition:
      transform .25s ease,
      border-color .25s ease,
      box-shadow .25s ease;
  }

  .vx-mini-promo:hover{
    color:#fff;
    text-decoration:none;

    transform:translateY(-3px);

    border-color:rgba(255,255,255,.60);

    box-shadow:
      0 20px 42px rgba(0,15,42,.34),
      inset 0 1px 0 rgba(255,255,255,.28);
  }

  .vx-mini-promo:focus-visible{
    outline:3px solid #fff;
    outline-offset:4px;
  }

  /* Subtle animated shimmer */
  .vx-mini-promo::before{
    content:"";
    position:absolute;
    z-index:0;

    top:-120%;
    left:-35%;

    width:20%;
    height:350%;

    pointer-events:none;

    transform:rotate(18deg);

    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.17),
      transparent
    );

    animation:vx-mini-shimmer 7s ease-in-out infinite;
  }

  /* Fine illuminated line */
  .vx-mini-promo::after{
    content:"";
    position:absolute;
    z-index:0;

    top:0;
    left:12%;

    width:76%;
    height:1px;

    pointer-events:none;

    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.80),
      transparent
    );
  }

  .vx-mini-promo-copy{
    position:relative;
    z-index:2;

    min-width:0;
    text-align:left;
  }

  .vx-mini-promo-topline{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;

    margin-bottom:4px;
  }

  .vx-mini-promo-badge{
    display:inline-flex;
    align-items:center;
    gap:5px;

    padding:4px 7px;

    border:1px solid rgba(255,255,255,.38);
    border-radius:999px;

    background:rgba(0,28,57,.40);

    color:#fff;

    font:
      800 8px/1
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:.09em;
    text-transform:uppercase;
  }

  .vx-mini-promo-dot{
    width:5px;
    height:5px;
    flex:0 0 auto;

    border-radius:50%;

    background:#70f0ae;

    box-shadow:
      0 0 0 3px rgba(112,240,174,.10),
      0 0 9px rgba(112,240,174,.60);

    animation:vx-mini-pulse 2.8s ease-in-out infinite;
  }

  .vx-mini-promo-platform{
    color:rgba(255,255,255,.72);

    font:
      800 8px/1.1
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:.10em;
    text-transform:uppercase;
  }

  .vx-mini-promo-title{
    margin:0;

    color:#fff;

    font:
      850 18px/1.12
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:-.02em;
  }

  .vx-mini-promo-title span{
    color:#b6e5ff;

    text-shadow:
      0 0 15px rgba(182,229,255,.22);
  }

  .vx-mini-promo-text{
    margin:4px 0 0;

    color:rgba(255,255,255,.86);

    font:
      500 10.5px/1.35
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;
  }

  .vx-mini-promo-button{
    position:relative;
    z-index:2;
    overflow:hidden;

    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    flex:0 0 auto;

    min-width:130px;
    padding:10px 12px;

    border:1px solid rgba(255,255,255,.34);
    border-radius:11px;

    background:linear-gradient(
      135deg,
      #ff7b49,
      #ef552e
    );

    color:#fff;

    font:
      800 10px/1.1
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    box-shadow:
      0 9px 20px rgba(185,50,21,.30),
      inset 0 1px 0 rgba(255,255,255,.26);

    transition:
      transform .25s ease,
      box-shadow .25s ease;
  }

  .vx-mini-promo-button::before{
    content:"";

    position:absolute;
    inset:0;

    pointer-events:none;

    background:linear-gradient(
      110deg,
      transparent 22%,
      rgba(255,255,255,.25) 48%,
      transparent 73%
    );

    transform:translateX(-125%);
    transition:transform .65s ease;
  }

  .vx-mini-promo:hover .vx-mini-promo-button{
    transform:translateY(-1px);

    box-shadow:
      0 13px 25px rgba(185,50,21,.38),
      inset 0 1px 0 rgba(255,255,255,.30);
  }

  .vx-mini-promo:hover .vx-mini-promo-button::before{
    transform:translateX(125%);
  }

  .vx-mini-promo-arrow{
    font-size:13px;
    line-height:1;

    transition:transform .25s ease;
  }

  .vx-mini-promo:hover .vx-mini-promo-arrow{
    transform:translateX(3px);
  }

  @keyframes vx-mini-shimmer{
    0%,
    58%{
      left:-35%;
      opacity:0;
    }

    66%{
      opacity:1;
    }

    84%,
    100%{
      left:125%;
      opacity:0;
    }
  }

  @keyframes vx-mini-pulse{
    0%,
    100%{
      transform:scale(1);
    }

    50%{
      transform:scale(1.18);
    }
  }

  @media (max-width:700px){
    .vx-mini-promo-wrap{
      width:min(500px,92%);
      margin-top:22px;
    }

    .vx-mini-promo{
      gap:12px;
      padding:12px;
    }

    .vx-mini-promo-title{
      font-size:17px;
    }

    .vx-mini-promo-text{
      font-size:10px;
    }

    .vx-mini-promo-button{
      min-width:115px;
      padding:9px 10px;
      font-size:9.5px;
    }
  }

  @media (max-width:520px){
    .vx-mini-promo{
      flex-direction:column;
      align-items:stretch;

      padding:13px;

      text-align:center;
    }

    .vx-mini-promo-copy{
      text-align:center;
    }

    .vx-mini-promo-topline{
      justify-content:center;
    }

    .vx-mini-promo-button{
      align-self:center;
      min-width:155px;
    }
  }

  @media (prefers-reduced-motion:reduce){
    .vx-mini-promo::before,
    .vx-mini-promo-dot{
      animation:none;
    }

    .vx-mini-promo,
    .vx-mini-promo-button,
    .vx-mini-promo-button::before,
    .vx-mini-promo-arrow{
      transition:none;
    }
  }
</style>

<div class="vx-mini-promo-wrap">
  <a
    class="vx-mini-promo"
    href="https://ai.vaxonyx.com/bulkmind/#/"
    aria-label="Explore the BulkMind AI platform"
  >
    <div class="vx-mini-promo-copy">
      <div class="vx-mini-promo-topline">
        <span class="vx-mini-promo-badge">
          <span class="vx-mini-promo-dot" aria-hidden="true"></span>
          New Launch
        </span>

        <span class="vx-mini-promo-platform">
          Vaxonyx AI Platform
        </span>
      </div>

      <h2 class="vx-mini-promo-title">
        Introducing <span>BulkMind AI</span>
      </h2>

      <p class="vx-mini-promo-text">
        AI-powered bulk RNA-seq analysis and biological interpretation.
      </p>
    </div>

    <span class="vx-mini-promo-button" aria-hidden="true">
      Explore Platform
      <span class="vx-mini-promo-arrow">→</span>
    </span>
  </a>
</div>
