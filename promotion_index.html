<style>
  /*
   * BulkMind AI homepage promotion
   * Medium-plus version: approximately 20% larger
   */

  .vx-bm-promo-wrap{
    width:min(910px,94%);
    margin:34px auto 0;
    padding:0;
  }

  .vx-bm-promo{
    position:relative;
    isolation:isolate;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:29px;

    width:100%;
    box-sizing:border-box;
    padding:22px 24px;

    color:#fff;
    text-align:left;
    text-decoration:none;

    border:1px solid rgba(255,255,255,.42);
    border-radius:22px;

    background:
      radial-gradient(
        circle at 91% 18%,
        rgba(111,211,255,.24),
        transparent 34%
      ),
      linear-gradient(
        135deg,
        rgba(255,255,255,.20),
        rgba(255,255,255,.08)
      );

    box-shadow:
      0 23px 50px rgba(0,15,42,.31),
      inset 0 1px 0 rgba(255,255,255,.29),
      inset 0 -1px 0 rgba(255,255,255,.07);

    -webkit-backdrop-filter:blur(16px);
    backdrop-filter:blur(16px);

    transform:translateZ(0);

    transition:
      transform .25s ease,
      border-color .25s ease,
      box-shadow .25s ease;
  }

  /* Fine illuminated line across the top */
  .vx-bm-promo::after{
    content:"";
    position:absolute;
    z-index:0;

    top:0;
    left:10%;

    width:80%;
    height:1px;

    pointer-events:none;

    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.92),
      transparent
    );

    opacity:.72;
  }

  /* Slow premium shimmer */
  .vx-bm-promo::before{
    content:"";
    position:absolute;
    z-index:0;

    top:-120%;
    left:-34%;

    width:21%;
    height:350%;

    pointer-events:none;

    transform:rotate(18deg);

    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.19),
      transparent
    );

    animation:vx-bm-shimmer 7.2s ease-in-out infinite;
  }

  .vx-bm-promo:hover{
    color:#fff;
    text-decoration:none;

    transform:translateY(-4px);

    border-color:rgba(255,255,255,.67);

    box-shadow:
      0 31px 64px rgba(0,15,42,.39),
      inset 0 1px 0 rgba(255,255,255,.33),
      inset 0 -1px 0 rgba(255,255,255,.08);
  }

  .vx-bm-promo:focus-visible{
    outline:3px solid rgba(255,255,255,.96);
    outline-offset:5px;
  }

  .vx-bm-promo-copy{
    position:relative;
    z-index:2;

    min-width:0;
    flex:1 1 auto;
  }

  .vx-bm-promo-meta{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;

    margin:0 0 8px;
  }

  .vx-bm-promo-badge{
    display:inline-flex;
    align-items:center;
    gap:7px;

    padding:6px 10px;

    border:1px solid rgba(255,255,255,.44);
    border-radius:999px;

    background:rgba(0,28,57,.43);

    color:#fff;

    font:
      800 10px/1
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:.10em;
    text-transform:uppercase;

    box-shadow:0 7px 18px rgba(0,0,0,.14);
  }

  .vx-bm-promo-dot{
    width:7px;
    height:7px;
    flex:0 0 auto;

    border-radius:50%;

    background:#70f0ae;

    box-shadow:
      0 0 0 5px rgba(112,240,174,.11),
      0 0 15px rgba(112,240,174,.66);

    animation:vx-bm-pulse 2.8s ease-in-out infinite;
  }

  .vx-bm-promo-platform{
    color:rgba(255,255,255,.78);

    font:
      800 10px/1.2
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:.12em;
    text-transform:uppercase;
  }

  .vx-bm-promo-title{
    margin:0;

    color:#fff;

    font:
      850 29px/1.12
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    letter-spacing:-.025em;
  }

  .vx-bm-promo-title span{
    color:#b7e6ff;

    text-shadow:
      0 0 22px rgba(183,230,255,.25);
  }

  .vx-bm-promo-description{
    max-width:640px;

    margin:8px 0 0;

    color:rgba(255,255,255,.90);

    font:
      500 14.5px/1.48
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;
  }

  .vx-bm-promo-action{
    position:relative;
    z-index:2;

    display:flex;
    align-items:center;
    justify-content:center;

    flex:0 0 auto;
  }

  .vx-bm-promo-button{
    position:relative;
    overflow:hidden;

    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:9px;

    min-width:198px;
    padding:15px 19px;

    box-sizing:border-box;

    border:1px solid rgba(255,255,255,.38);
    border-radius:15px;

    background:linear-gradient(
      135deg,
      #ff7b49,
      #ef552e
    );

    color:#fff;

    font:
      800 14px/1.15
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Inter,
      Arial,
      sans-serif;

    white-space:nowrap;

    box-shadow:
      0 15px 30px rgba(185,50,21,.35),
      inset 0 1px 0 rgba(255,255,255,.29);

    transition:
      transform .25s ease,
      box-shadow .25s ease,
      filter .25s ease;
  }

  .vx-bm-promo-button::before{
    content:"";

    position:absolute;
    inset:0;

    pointer-events:none;

    background:linear-gradient(
      110deg,
      transparent 22%,
      rgba(255,255,255,.28) 48%,
      transparent 73%
    );

    transform:translateX(-125%);
    transition:transform .7s ease;
  }

  .vx-bm-promo:hover .vx-bm-promo-button{
    transform:translateY(-2px);
    filter:saturate(1.08);

    box-shadow:
      0 20px 38px rgba(185,50,21,.44),
      inset 0 1px 0 rgba(255,255,255,.33);
  }

  .vx-bm-promo:hover .vx-bm-promo-button::before{
    transform:translateX(125%);
  }

  .vx-bm-promo-arrow{
    display:inline-block;

    font-size:18px;
    line-height:1;

    transition:transform .25s ease;
  }

  .vx-bm-promo:hover .vx-bm-promo-arrow{
    transform:translateX(4px);
  }

  @keyframes vx-bm-shimmer{
    0%,
    58%{
      left:-34%;
      opacity:0;
    }

    66%{
      opacity:1;
    }

    84%,
    100%{
      left:125%;
      opacity:0;
    }
  }

  @keyframes vx-bm-pulse{
    0%,
    100%{
      transform:scale(1);

      box-shadow:
        0 0 0 5px rgba(112,240,174,.11),
        0 0 14px rgba(112,240,174,.56);
    }

    50%{
      transform:scale(1.16);

      box-shadow:
        0 0 0 8px rgba(112,240,174,.04),
        0 0 20px rgba(112,240,174,.78);
    }
  }

  @media (max-width:900px){
    .vx-bm-promo-wrap{
      width:min(760px,92%);
      margin-top:30px;
    }

    .vx-bm-promo{
      gap:21px;
      padding:19px 21px;
    }

    .vx-bm-promo-title{
      font-size:25px;
    }

    .vx-bm-promo-description{
      font-size:13px;
    }

    .vx-bm-promo-button{
      min-width:170px;
      padding:13px 15px;
      font-size:12px;
    }
  }

  @media (max-width:680px){
    .vx-bm-promo-wrap{
      width:92%;
      margin-top:26px;
    }

    .vx-bm-promo{
      flex-direction:column;
      align-items:stretch;
      gap:17px;

      padding:18px;

      text-align:center;
    }

    .vx-bm-promo-copy{
      text-align:center;
    }

    .vx-bm-promo-meta{
      justify-content:center;
    }

    .vx-bm-promo-description{
      margin-inline:auto;
    }

    .vx-bm-promo-action{
      width:100%;
    }

    .vx-bm-promo-button{
      min-width:190px;
    }
  }

  @media (max-width:420px){
    .vx-bm-promo-wrap{
      width:94%;
      margin-top:23px;
    }

    .vx-bm-promo{
      padding:16px 14px;
      border-radius:18px;
    }

    .vx-bm-promo-title{
      font-size:22px;
    }

    .vx-bm-promo-description{
      font-size:12px;
    }

    .vx-bm-promo-button{
      padding:12px 15px;
      font-size:11.5px;
    }
  }

  @media (prefers-reduced-motion:reduce){
    .vx-bm-promo::before,
    .vx-bm-promo-dot{
      animation:none;
    }

    .vx-bm-promo,
    .vx-bm-promo-button,
    .vx-bm-promo-button::before,
    .vx-bm-promo-arrow{
      transition:none;
    }
  }
</style>

<div class="vx-bm-promo-wrap">
  <a
    class="vx-bm-promo"
    href="https://ai.vaxonyx.com/bulkmind/#/"
    aria-label="Explore the newly launched BulkMind AI platform"
  >
    <div class="vx-bm-promo-copy">
      <div class="vx-bm-promo-meta">
        <span class="vx-bm-promo-badge">
          <span class="vx-bm-promo-dot" aria-hidden="true"></span>
          New Launch
        </span>

        <span class="vx-bm-promo-platform">
          Vaxonyx AI Platform
        </span>
      </div>

      <h2 class="vx-bm-promo-title">
        Introducing <span>BulkMind AI</span>
      </h2>

      <p class="vx-bm-promo-description">
        AI-powered bulk RNA-seq analysis, pathway prioritization,
        transcription-factor activity, and biological interpretation.
      </p>
    </div>

    <div class="vx-bm-promo-action" aria-hidden="true">
      <span class="vx-bm-promo-button">
        Explore BulkMind AI
        <span class="vx-bm-promo-arrow">→</span>
      </span>
    </div>
  </a>
</div>
